# Envoy proxy configuration for MCP Gateway routing
# Source: Kuadrant/mcp-gateway binary install guide (base) + K8s EnvoyFilter (ext_proc settings)
#
# Architecture:
#   Client -> Envoy :8888 -> ext_proc (Router :50051) -> route by :authority header:
#     localhost  -> mcp_broker (:8080)  — initialize, tools/list
#     s3.local   -> s3_backend (:3001)  — s3_ prefixed tools/call
#     cv.local   -> cv_backend (:3002)  — cv_ prefixed tools/call
#
# Critical settings (see 04-RESEARCH.md pitfalls):
#   - mutation_rules.allow_all_routing: true  — enables Router :authority rewrites
#   - message_timeout: 5s                     — default 200ms is too short
#   - allow_mode_override: true               — Router switches response body to STREAMED
#   - http2_protocol_options on mcp_router    — gRPC requires HTTP/2

static_resources:
  listeners:
  - name: mcp_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8888
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          codec_type: AUTO
          route_config:
            name: local_route
            virtual_hosts:
            # Broker: handles initialize, tools/list, and other non-tool-call methods
            - name: mcp_broker
              domains: ["localhost"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: mcp_broker
            # S3 MCP Server: handles tools/call for s3_ prefixed tools
            - name: s3_backend
              domains: ["s3.local"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: s3_backend
                request_headers_to_add:
                - header:
                    key: "Accept"
                    value: "application/json, text/event-stream"
                  append_action: OVERWRITE_IF_EXISTS_OR_ADD
            # CV MCP Server: handles tools/call for cv_ prefixed tools
            - name: cv_backend
              domains: ["cv.local"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: cv_backend
                request_headers_to_add:
                - header:
                    key: "Accept"
                    value: "application/json, text/event-stream"
                  append_action: OVERWRITE_IF_EXISTS_OR_ADD
          http_filters:
          # ext_proc MUST come BEFORE router (order matters)
          - name: envoy.filters.http.ext_proc
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
              failure_mode_allow: false
              allow_mode_override: true
              mutation_rules:
                allow_all_routing: true
              message_timeout: 5s
              processing_mode:
                request_header_mode: SEND
                response_header_mode: SEND
                request_body_mode: BUFFERED
                response_body_mode: NONE
                request_trailer_mode: SKIP
                response_trailer_mode: SKIP
              grpc_service:
                envoy_grpc:
                  cluster_name: mcp_router
          # Router filter MUST be last (Pitfall 6)
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  # Broker: MCP protocol handler (initialize, tools/list, session management)
  - name: mcp_broker
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: mcp_broker
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 8080

  # Router: ext_proc gRPC server (parses JSON-RPC, makes routing decisions)
  # http2_protocol_options is CRITICAL -- gRPC requires HTTP/2
  - name: mcp_router
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    http2_protocol_options: {}
    load_assignment:
      cluster_name: mcp_router
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 50051

  # S3 MCP Server: backend for s3_ prefixed tools
  - name: s3_backend
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: s3_backend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 3001

  # CV MCP Server: backend for cv_ prefixed tools
  - name: cv_backend
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: cv_backend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 3002
